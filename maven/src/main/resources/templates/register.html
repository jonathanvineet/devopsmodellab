<!DOCTYPE html>
<html>
<body>
    <h1>Register</h1>
    <p th:if="${error}" th:text="${error}"></p>
    <form method="POST" action="/register">
        <input type="text" name="username" placeholder="Username">
        <input type="password" name="password" placeholder="Password">
        <button type="submit">Register</button>
    </form>
    <a href="/">Home</a>
</body>
</html>
